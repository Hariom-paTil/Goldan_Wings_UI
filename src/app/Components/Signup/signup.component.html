<div class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header-tabs">
      <button type="button" class="tab-btn" [class.active]="mode === 'login'" (click)="setMode('login')">Login</button>
      <button type="button" class="tab-btn" [class.active]="mode === 'signup'" (click)="setMode('signup')">Sign
        Up</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Email
        <input formControlName="email" type="email" placeholder="you@example.com" />
      </label>
      <div class="field-error" *ngIf="form.controls['email'].invalid && form.controls['email'].touched">
        Please enter a valid email.
      </div>

      <label>
        Password
        <input formControlName="password" type="password" placeholder="Minimum 6 characters" />
      </label>
      <div class="field-error" *ngIf="form.controls['password'].invalid && form.controls['password'].touched">
        Password must be at least 6 characters.
      </div>

      <div class="actions">
        <button type="button" class="btn secondary" (click)="cancel()" [disabled]="loading">Cancel</button>
        <button type="submit" class="btn primary" [class.success-state]="success" [disabled]="loading">
          {{ success ? 'Happy Smile :)' : (loading ? (mode === 'login' ? 'Logging in...' : 'Signing up...') : (mode ===
          'login' ? 'Login' : 'Sign Up')) }}
        </button>
      </div>

      <p class="error" *ngIf="error">{{ error }}</p>
      <p class="success" *ngIf="successMessage">{{ successMessage }}</p>
    </form>
  </div>
</div>
